name: Sync MCP Space

on:
  push:
    branches:
      - main
    paths:
      - "mcp/**"
      - ".github/workflows/sync-mcp-space.yml"
  workflow_dispatch:

jobs:
  sync-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Statskontoretdatalabb/StatskontoretMCP
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          subdirectory: mcp
