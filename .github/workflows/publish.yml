name: Build And Publish Dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "13 4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Build local artifacts
        run: uv run statskontoret-scraper build
      - name: Publish artifacts to Hugging Face dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run statskontoret-scraper publish
      - name: Restart MCP Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >
          curl -X POST
          -H "Authorization: Bearer $HF_TOKEN"
          "https://huggingface.co/api/spaces/Statskontoretdatalabb/StatskontoretMCP/restart"
